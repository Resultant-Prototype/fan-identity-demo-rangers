name: Mirror to Resultant-Prototype

on:
  push:
    branches: [main]

jobs:
  mirror:
    if: github.repository == 'brianvinson-serve/fan-identity-demo-rangers'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to Resultant-Prototype mirror
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          git push https://bvinsonrez:${MIRROR_PAT}@github.com/Resultant-Prototype/fan-identity-demo-rangers.git main --force

      - name: Trigger Pages deploy workflow on mirror
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token ${MIRROR_PAT}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Resultant-Prototype/fan-identity-demo-rangers/actions/workflows/pages-deploy.yml/dispatches \
            -d '{"ref":"main"}'
