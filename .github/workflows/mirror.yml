name: Mirror to Resultant-Prototype

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to Resultant-Prototype mirror
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          git push https://bvinsonrez:${MIRROR_PAT}@github.com/Resultant-Prototype/fan-identity-demo-rangers.git main --force
