name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only run this on the Resultant-Prototype mirror, not on the source repo
jobs:
  deploy:
    if: github.repository == 'Resultant-Prototype/fan-identity-demo-rangers'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
